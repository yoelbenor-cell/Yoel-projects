<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8"/>
<title>Space Shooter</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#000; display:flex; justify-content:center; align-items:center; height:100vh; overflow:hidden; font-family:'Segoe UI',Arial,sans-serif; }
  #gameContainer { position:relative; }
  canvas { display:block; }
  #ui { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; }
  #selectScreen {
    position:absolute; top:0; left:0; width:100%; height:100%;
    background:radial-gradient(ellipse at center, #0a0a2e 0%, #000 100%);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    color:white; z-index:10;
  }
  #selectScreen h1 {
    font-size:2.2rem; font-weight:900; letter-spacing:3px;
    background:linear-gradient(90deg,#00f0ff,#a855f7,#ff6b6b);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    margin-bottom:8px; text-align:center;
  }
  #selectScreen p { color:#8888bb; margin-bottom:40px; font-size:1rem; }
  .heroes {
    display:grid;
    grid-template-columns: repeat(4, 1fr);
    gap:16px;
    width:100%;
    max-width:500px;
  }
  .hero-card {
    display:flex; flex-direction:column; align-items:center; cursor:pointer;
    padding:12px 6px; border-radius:14px; border:2px solid #333;
    background:rgba(255,255,255,0.04); transition:all 0.25s;
  }
  .hero-card:hover {
    border-color:#a855f7; background:rgba(168,85,247,0.15);
    transform:translateY(-5px); box-shadow:0 0 22px rgba(168,85,247,0.5);
  }
  .hero-card img {
    width:86px; height:86px; border-radius:50%; object-fit:cover;
    border:3px solid #444; margin-bottom:9px;
  }
  .hero-card:hover img { border-color:#a855f7; }
  .hero-card span { font-size:0.95rem; font-weight:700; color:#e0e0ff; }
  #gameOverScreen, #winScreen {
    position:absolute; top:0; left:0; width:100%; height:100%;
    background:rgba(0,0,0,0.85); display:none; flex-direction:column;
    align-items:center; justify-content:center; color:white; z-index:10;
  }
  #gameOverScreen h2 { font-size:3rem; color:#ff4444; margin-bottom:16px; }
  #winScreen h2 { font-size:3rem; color:#44ff88; margin-bottom:16px; }
  .screen-score { font-size:1.4rem; color:#aaa; margin-bottom:30px; }
  .btn {
    padding:14px 36px; font-size:1.1rem; font-weight:700; border:none;
    border-radius:40px; cursor:pointer; transition:all 0.2s;
    background:linear-gradient(135deg,#a855f7,#6366f1); color:white;
    pointer-events:all;
  }
  .btn:hover { transform:scale(1.07); box-shadow:0 0 20px rgba(168,85,247,0.6); }
  #hud {
    position:absolute; top:0; left:0; width:100%;
    display:flex; justify-content:space-between; align-items:center;
    padding:12px 18px;
  }
  #scoreDisplay { color:#00f0ff; font-size:1.1rem; font-weight:700; text-shadow:0 0 8px #00f0ff; }
  #waveDisplay { color:#a855f7; font-size:1rem; font-weight:600; }
  #livesDisplay { display:flex; gap:6px; align-items:center; }
  .life-dot { width:14px; height:14px; border-radius:50%; background:#ff6b6b; box-shadow:0 0 6px #ff6b6b; }
  #powerupDisplay { position:absolute; bottom:14px; left:50%; transform:translateX(-50%); color:#ffd700; font-size:0.9rem; font-weight:600; text-shadow:0 0 8px #ffd700; }
</style>
</head>
<body>
<div id="gameContainer">
  <canvas id="canvas"></canvas>

  <!-- Select Screen -->
  <div id="selectScreen">
    <h1>SPACE SHOOTER</h1>
    <p>בחר את הגיבור שלך</p>
    <div class="heroes">
      <div class="hero-card" onclick="startGame('yoav')">
        <img src="yoav.png" alt="יואב"/>
        <span>יואב</span>
      </div>
      <div class="hero-card" onclick="startGame('carmel')">
        <img src="Carmel.png" alt="כרמל"/>
        <span>כרמל</span>
      </div>
      <div class="hero-card" onclick="startGame('rotem')">
        <img src="rotem.png" alt="רותם"/>
        <span>רותם</span>
      </div>
      <div class="hero-card" onclick="startGame('mayan')">
        <img src="mayan.jpg" alt="מעין"/>
        <span>מעין</span>
      </div>
      <div class="hero-card" onclick="startGame('eitan')">
        <img src="eitan.jpg" alt="איתן"/>
        <span>איתן</span>
      </div>
      <div class="hero-card" onclick="startGame('zuf')">
        <img src="zuf.png" alt="צוף"/>
        <span>צוף</span>
      </div>
      <div class="hero-card" onclick="startGame('roni')">
        <img src="roni.jpg" alt="רוני"/>
        <span>רוני</span>
      </div>
      <div class="hero-card" onclick="startGame('amos')">
        <img src="amos.jpg" alt="עמוס"/>
        <span>עמוס</span>
      </div>
      <div class="hero-card" onclick="startGame('shalev')">
        <img src="shalev.jpg" alt="שלו"/>
        <span>שלו</span>
      </div>
    </div>
  </div>

  <!-- HUD -->
  <div id="hud" style="display:none;">
    <div id="scoreDisplay">ניקוד: 0</div>
    <div id="waveDisplay">גל 1</div>
    <div id="livesDisplay"></div>
  </div>
  <div id="powerupDisplay"></div>

  <!-- Game Over -->
  <div id="gameOverScreen">
    <h2>GAME OVER</h2>
    <div class="screen-score" id="finalScore"></div>
    <button class="btn" onclick="returnToSelect()">שחק שוב</button>
  </div>

  <!-- Win -->
  <div id="winScreen">
    <h2>ניצחת!</h2>
    <div class="screen-score" id="winScore"></div>
    <button class="btn" onclick="returnToSelect()">שחק שוב</button>
  </div>
</div>

<script>
const W = 480, H = 700;
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
canvas.width = W; canvas.height = H;
document.getElementById('gameContainer').style.width = W+'px';
document.getElementById('gameContainer').style.height = H+'px';

// ---- State ----
let state = 'select'; // select | playing | over | win
let score = 0, wave = 1, lives = 3;
let player, bullets, enemies, enemyBullets, particles, powerups, stars;
let keys = {};
let heroName = '';
let heroImg = null;
let animId = null;
let powerupActive = null, powerupTimer = 0;
let bossActive = false, boss = null;
let shootCooldown = 0;
let soccerballs = [];
let soccerSpawnTimer = 0;
const MAX_WAVES = 9;

// ---- Stars ----
function initStars() {
  stars = Array.from({length:120}, () => ({
    x: Math.random()*W, y: Math.random()*H,
    r: Math.random()*1.5+0.3, speed: Math.random()*1.5+0.5,
    alpha: Math.random()*0.7+0.3
  }));
}

function updateStars() {
  for (let s of stars) {
    s.y += s.speed;
    if (s.y > H) { s.y = 0; s.x = Math.random()*W; }
  }
}

function drawStars() {
  for (let s of stars) {
    ctx.globalAlpha = s.alpha;
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ---- Player ----
function createPlayer() {
  return { x: W/2, y: H-90, w: 56, h: 56, speed: 5, shield: false, rapid: false, double: false };
}

function drawPlayer(p) {
  // Ship body
  ctx.save();
  ctx.translate(p.x, p.y);
  // Glow
  ctx.shadowColor = '#a855f7';
  ctx.shadowBlur = 18;
  // Main body
  ctx.fillStyle = '#6366f1';
  ctx.beginPath();
  ctx.moveTo(0, -28); ctx.lineTo(20, 18); ctx.lineTo(0, 10); ctx.lineTo(-20, 18);
  ctx.closePath(); ctx.fill();
  // Wings
  ctx.fillStyle = '#a855f7';
  ctx.beginPath(); ctx.moveTo(-20,18); ctx.lineTo(-36,28); ctx.lineTo(-16,8); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(20,18); ctx.lineTo(36,28); ctx.lineTo(16,8); ctx.closePath(); ctx.fill();
  // Cockpit circle with hero photo
  ctx.shadowBlur = 0;
  ctx.save();
  ctx.beginPath(); ctx.arc(0, 0, 18, 0, Math.PI*2); ctx.clip();
  if (heroImg && heroImg.complete) ctx.drawImage(heroImg, -18, -18, 36, 36);
  else { ctx.fillStyle='#333'; ctx.fillRect(-18,-18,36,36); }
  ctx.restore();
  // Cockpit ring
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(0, 0, 18, 0, Math.PI*2); ctx.stroke();
  // Engine glow
  ctx.shadowColor='#ff9500'; ctx.shadowBlur=12;
  ctx.fillStyle='#ff6b00';
  ctx.beginPath(); ctx.ellipse(0, 22, 7, 10, 0, 0, Math.PI*2); ctx.fill();
  // Shield
  if (p.shield) {
    ctx.shadowColor='#00f0ff'; ctx.shadowBlur=20;
    ctx.strokeStyle='rgba(0,240,255,0.6)'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.arc(0, 0, 32, 0, Math.PI*2); ctx.stroke();
  }
  ctx.restore();
}

// ---- Alien enemy ----
function drawAlien(e) {
  ctx.save();
  ctx.translate(e.x, e.y);
  const t = Date.now()/400;
  // Body
  ctx.shadowColor = '#00ff88'; ctx.shadowBlur = 12;
  ctx.fillStyle = e.hit ? '#ff4444' : '#00cc55';
  ctx.beginPath(); ctx.ellipse(0, 0, e.r, e.r*0.75, 0, 0, Math.PI*2); ctx.fill();
  // Tentacles
  ctx.strokeStyle = '#00aa44'; ctx.lineWidth = 2.5;
  for (let i = -2; i <= 2; i++) {
    const bx = i * (e.r*0.38);
    ctx.beginPath();
    ctx.moveTo(bx, e.r*0.6);
    ctx.quadraticCurveTo(bx + Math.sin(t+i)*6, e.r*1.1, bx, e.r*1.5);
    ctx.stroke();
  }
  // Eye
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(0, -e.r*0.1, e.r*0.38, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#ff0';
  ctx.beginPath(); ctx.arc(e.r*0.1, -e.r*0.18, e.r*0.14, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(e.r*0.13, -e.r*0.18, e.r*0.07, 0, Math.PI*2); ctx.fill();
  // Health bar for boss
  if (e.isBoss) {
    const bw = e.r*2.2;
    ctx.fillStyle = '#333'; ctx.fillRect(-bw/2, -e.r-16, bw, 8);
    ctx.fillStyle = '#ff4444'; ctx.fillRect(-bw/2, -e.r-16, bw*(e.hp/e.maxHp), 8);
  }
  ctx.restore();
}

// ---- Spawn enemies ----
function spawnWave(w) {
  enemies = []; bossActive = false; boss = null;
  if (w % 3 === 0) {
    // Boss wave
    bossActive = true;
    const hp = 5 + w*3;
    boss = { x:W/2, y:90, r:44, hp, maxHp:hp, isBoss:true,
      vx:1.8+w*0.2, vy:0, shootTimer:0, hit:false, hitTimer:0 };
    enemies.push(boss);
  } else {
    const cols = Math.min(4+Math.floor(w/2), 7);
    const rows = Math.min(2+Math.floor(w/3), 4);
    const sp = 60, startX = W/2 - (cols-1)*sp/2;
    for (let r=0;r<rows;r++) for (let c=0;c<cols;c++) {
      enemies.push({
        x: startX+c*sp, y: 60+r*52, r:20, hp:1+Math.floor(w/3),
        maxHp:1+Math.floor(w/3), isBoss:false,
        vx:(Math.random()>0.5?1:-1)*(1+w*0.15), vy:0.3+w*0.05,
        shootTimer: Math.random()*120, hit:false, hitTimer:0
      });
    }
  }
}

// ---- Soccer Ball ----
function drawSoccerBall(sb) {
  ctx.save();
  ctx.translate(sb.x, sb.y);
  ctx.rotate(sb.angle);
  // Glow
  ctx.shadowColor = '#fff'; ctx.shadowBlur = 10;
  // White base
  ctx.fillStyle = '#f0f0f0';
  ctx.beginPath(); ctx.arc(0, 0, sb.r, 0, Math.PI*2); ctx.fill();
  // Black pentagons (simplified as lines pattern)
  ctx.strokeStyle = '#111'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(0, 0, sb.r, 0, Math.PI*2); ctx.stroke();
  // Center pentagon
  ctx.fillStyle = '#111';
  ctx.beginPath();
  for (let i=0;i<5;i++) {
    const a = (i/5)*Math.PI*2 - Math.PI/2;
    i===0 ? ctx.moveTo(Math.cos(a)*sb.r*0.38, Math.sin(a)*sb.r*0.38)
           : ctx.lineTo(Math.cos(a)*sb.r*0.38, Math.sin(a)*sb.r*0.38);
  }
  ctx.closePath(); ctx.fill();
  // Surrounding patches
  for (let i=0;i<5;i++) {
    const a = (i/5)*Math.PI*2 - Math.PI/2;
    const px = Math.cos(a)*sb.r*0.68, py = Math.sin(a)*sb.r*0.68;
    ctx.fillStyle = '#111';
    ctx.beginPath();
    for (let j=0;j<5;j++) {
      const pa = (j/5)*Math.PI*2 + a;
      j===0 ? ctx.moveTo(px+Math.cos(pa)*sb.r*0.22, py+Math.sin(pa)*sb.r*0.22)
             : ctx.lineTo(px+Math.cos(pa)*sb.r*0.22, py+Math.sin(pa)*sb.r*0.22);
    }
    ctx.closePath(); ctx.fill();
  }
  // Warning ring
  ctx.shadowColor='#ff0000'; ctx.shadowBlur=16;
  ctx.strokeStyle='rgba(255,0,0,0.5)'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.arc(0, 0, sb.r+5, 0, Math.PI*2); ctx.stroke();
  ctx.restore();
}

// ---- Bullets ----
function spawnBullet(x, y, vy, color, fromPlayer) {
  bullets.push({ x, y, vy, color, fromPlayer, r:4 });
}

// ---- Particles ----
function spawnExplosion(x, y, color) {
  for (let i=0;i<18;i++) {
    const angle = Math.random()*Math.PI*2;
    const speed = Math.random()*4+1;
    particles.push({ x, y, vx:Math.cos(angle)*speed, vy:Math.sin(angle)*speed,
      r:Math.random()*4+1, alpha:1, color, life:1 });
  }
}

// ---- Powerup ----
function spawnPowerup(x, y) {
  if (Math.random() > 0.4) return;
  const types = ['shield','rapid','double'];
  powerups.push({ x, y, vy:1.5, type:types[Math.floor(Math.random()*3)], r:14 });
}

function drawPowerup(p) {
  ctx.save();
  ctx.translate(p.x, p.y);
  const colors = { shield:'#00f0ff', rapid:'#ffd700', double:'#ff6bff' };
  const icons  = { shield:'S', rapid:'R', double:'D' };
  ctx.shadowColor = colors[p.type]; ctx.shadowBlur = 14;
  ctx.strokeStyle = colors[p.type]; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(0,0,p.r,0,Math.PI*2); ctx.stroke();
  ctx.fillStyle = colors[p.type]; ctx.font = 'bold 13px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(icons[p.type], 0, 0);
  ctx.restore();
}

// ---- HUD ----
function updateHUD() {
  document.getElementById('scoreDisplay').textContent = 'ניקוד: '+score;
  document.getElementById('waveDisplay').textContent = 'גל '+wave+(bossActive?' - BOSS':'');
  const ld = document.getElementById('livesDisplay');
  ld.innerHTML = '';
  for (let i=0;i<lives;i++) { const d=document.createElement('div'); d.className='life-dot'; ld.appendChild(d); }
  const pd = document.getElementById('powerupDisplay');
  if (powerupActive) pd.textContent = powerupActive==='shield'?'מגן פעיל!':powerupActive==='rapid'?'ירי מהיר!':'ירי כפול!';
  else pd.textContent = '';
}

// ---- Start ----
function startGame(hero) {
  heroName = hero;
  heroImg = new Image();
  const heroImgMap = { yoav:'yoav.png', carmel:'Carmel.png', rotem:'rotem.png', mayan:'mayan.jpg', eitan:'eitan.jpg', zuf:'zuf.png', roni:'roni.jpg', amos:'amos.jpg', shalev:'shalev.jpg' };
  heroImg.src = heroImgMap[hero] || 'rotem.png';
  document.getElementById('selectScreen').style.display = 'none';
  document.getElementById('hud').style.display = 'flex';
  score = 0; wave = 1; lives = 3;
  player = createPlayer();
  bullets = []; enemies = []; enemyBullets = []; particles = []; powerups = [];
  powerupActive = null; powerupTimer = 0; shootCooldown = 0;
  soccerballs = []; soccerSpawnTimer = 180;
  initStars();
  spawnWave(wave);
  state = 'playing';
  if (animId) cancelAnimationFrame(animId);
  loop();
}

function returnToSelect() {
  state = 'select';
  document.getElementById('selectScreen').style.display = 'flex';
  document.getElementById('gameOverScreen').style.display = 'none';
  document.getElementById('winScreen').style.display = 'none';
  document.getElementById('hud').style.display = 'none';
  if (animId) cancelAnimationFrame(animId);
}

// ---- Main Loop ----
function loop() {
  animId = requestAnimationFrame(loop);
  if (state !== 'playing') return;
  update();
  draw();
}

function update() {
  updateStars();

  // Player movement
  const p = player;
  if (keys['ArrowLeft']||keys['a']) p.x -= p.speed;
  if (keys['ArrowRight']||keys['d']) p.x += p.speed;
  if (keys['ArrowUp']||keys['w']) p.y -= p.speed;
  if (keys['ArrowDown']||keys['s']) p.y += p.speed;
  p.x = Math.max(30, Math.min(W-30, p.x));
  p.y = Math.max(80, Math.min(H-40, p.y));

  // Shooting
  shootCooldown--;
  const fireRate = powerupActive==='rapid' ? 8 : 18;
  if ((keys[' ']||keys['ArrowUp']) && shootCooldown<=0) {
    spawnBullet(p.x, p.y-30, -10, '#00f0ff', true);
    if (powerupActive==='double') spawnBullet(p.x-14, p.y-20, -10, '#ff6bff', true);
    shootCooldown = fireRate;
  }

  // Powerup timer
  if (powerupActive) {
    powerupTimer--;
    if (powerupTimer<=0) { powerupActive=null; player.shield=false; player.rapid=false; player.double=false; }
  }

  // Move bullets
  for (let i=bullets.length-1;i>=0;i--) {
    bullets[i].y += bullets[i].vy;
    if (bullets[i].y < -10 || bullets[i].y > H+10) bullets.splice(i,1);
  }

  // Move enemy bullets
  for (let i=enemyBullets.length-1;i>=0;i--) {
    enemyBullets[i].y += 4+wave*0.3;
    if (enemyBullets[i].y > H+10) { enemyBullets.splice(i,1); continue; }
    // Hit player
    const eb = enemyBullets[i];
    if (Math.hypot(eb.x-p.x, eb.y-p.y) < 22) {
      enemyBullets.splice(i,1);
      if (!p.shield) { lives--; spawnExplosion(p.x,p.y,'#ff6b6b'); if(lives<=0){gameOver();return;} }
      continue;
    }
  }

  // Move & update enemies
  let shiftDown = false;
  for (let e of enemies) {
    if (e.hit) { e.hitTimer--; if(e.hitTimer<=0) e.hit=false; }
    if (!e.isBoss) {
      e.x += e.vx;
      e.y += e.vy * 0.15;
      if (e.x < e.r || e.x > W-e.r) { e.vx *= -1; e.y += 12; }
      if (e.y > H-50) { gameOver(); return; }
      // Enemy shoot
      e.shootTimer--;
      if (e.shootTimer <= 0) {
        enemyBullets.push({x:e.x, y:e.y+e.r, r:5});
        e.shootTimer = 80 + Math.random()*80 - wave*4;
      }
    } else {
      // Boss movement
      e.x += e.vx;
      if (e.x < e.r+20 || e.x > W-e.r-20) e.vx *= -1;
      e.shootTimer--;
      if (e.shootTimer <= 0) {
        for (let a=-1;a<=1;a++) enemyBullets.push({x:e.x+a*20, y:e.y+e.r, r:7});
        e.shootTimer = 35 - wave*1.5;
      }
    }
  }

  // Bullet vs enemy
  for (let bi=bullets.length-1;bi>=0;bi--) {
    const b = bullets[bi];
    if (!b.fromPlayer) continue;
    for (let ei=enemies.length-1;ei>=0;ei--) {
      const e = enemies[ei];
      if (Math.hypot(b.x-e.x, b.y-e.y) < e.r+b.r) {
        bullets.splice(bi,1);
        e.hp--;
        e.hit=true; e.hitTimer=8;
        if (e.hp<=0) {
          spawnExplosion(e.x, e.y, e.isBoss?'#ff9500':'#00ff88');
          spawnPowerup(e.x, e.y);
          score += e.isBoss ? 500 : 100;
          if (e.isBoss) { bossActive = false; boss = null; }
          enemies.splice(ei,1);
        }
        break;
      }
    }
  }

  // Move powerups
  for (let i=powerups.length-1;i>=0;i--) {
    powerups[i].y += powerups[i].vy;
    if (powerups[i].y > H+20) { powerups.splice(i,1); continue; }
    if (Math.hypot(powerups[i].x-p.x, powerups[i].y-p.y) < 26) {
      const t = powerups[i].type;
      powerupActive = t; powerupTimer = 300;
      player.shield = t==='shield';
      player.rapid  = t==='rapid';
      player.double = t==='double';
      powerups.splice(i,1);
    }
  }

  // Spawn soccer balls
  soccerSpawnTimer--;
  if (soccerSpawnTimer <= 0) {
    const fromLeft = Math.random() > 0.5;
    soccerballs.push({
      x: fromLeft ? -20 : W+20,
      y: 80 + Math.random() * (H - 200),
      vx: (fromLeft ? 1 : -1) * (3 + wave*0.3),
      vy: (Math.random() - 0.5) * 4,
      r: 22, angle: 0, spin: (fromLeft ? 1 : -1) * 0.08
    });
    soccerSpawnTimer = 280 - wave*18;
  }

  // Move & check soccer balls
  for (let i=soccerballs.length-1;i>=0;i--) {
    const sb = soccerballs[i];
    sb.x += sb.vx; sb.y += sb.vy; sb.angle += sb.spin;
    if (sb.y < sb.r || sb.y > H-sb.r) sb.vy *= -1;
    if (sb.x < -60 || sb.x > W+60) { soccerballs.splice(i,1); continue; }
    // Instant kill on player contact
    if (Math.hypot(sb.x-p.x, sb.y-p.y) < sb.r+18) {
      if (!p.shield) {
        spawnExplosion(p.x, p.y, '#ff4444');
        gameOver(); return;
      }
    }
    // Player bullet destroys soccer ball
    for (let bi=bullets.length-1;bi>=0;bi--) {
      if (!bullets[bi].fromPlayer) continue;
      if (Math.hypot(bullets[bi].x-sb.x, bullets[bi].y-sb.y) < sb.r+bullets[bi].r) {
        spawnExplosion(sb.x, sb.y, '#ffffff');
        score += 50;
        bullets.splice(bi,1);
        soccerballs.splice(i,1);
        break;
      }
    }
  }

  // Update particles
  for (let i=particles.length-1;i>=0;i--) {
    const pt = particles[i];
    pt.x+=pt.vx; pt.y+=pt.vy; pt.vx*=0.93; pt.vy*=0.93;
    pt.alpha-=0.025;
    if (pt.alpha<=0) particles.splice(i,1);
  }

  // Next wave
  if (enemies.length===0) {
    wave++;
    if (wave > MAX_WAVES) { winGame(); return; }
    bullets=[]; enemyBullets=[];
    spawnWave(wave);
  }

  updateHUD();
}

function draw() {
  ctx.fillStyle='#020210'; ctx.fillRect(0,0,W,H);
  // Nebula bg
  const grad = ctx.createRadialGradient(W/2,H/2,80,W/2,H/2,W);
  grad.addColorStop(0,'rgba(60,20,100,0.18)');
  grad.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=grad; ctx.fillRect(0,0,W,H);

  drawStars();

  // Particles
  for (const pt of particles) {
    ctx.globalAlpha=pt.alpha;
    ctx.fillStyle=pt.color;
    ctx.beginPath(); ctx.arc(pt.x,pt.y,pt.r,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;

  // Powerups
  for (const pu of powerups) drawPowerup(pu);

  // Soccer balls
  for (const sb of soccerballs) drawSoccerBall(sb);

  // Enemies
  for (const e of enemies) drawAlien(e);

  // Enemy bullets
  for (const eb of enemyBullets) {
    ctx.save();
    ctx.shadowColor='#ff4444'; ctx.shadowBlur=10;
    ctx.fillStyle='#ff4444';
    ctx.beginPath(); ctx.arc(eb.x,eb.y,eb.r,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // Player bullets
  for (const b of bullets) {
    ctx.save();
    ctx.shadowColor=b.color; ctx.shadowBlur=12;
    ctx.fillStyle=b.color;
    ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // Player
  drawPlayer(player);
}

function gameOver() {
  state='over';
  document.getElementById('finalScore').textContent='ניקוד: '+score;
  document.getElementById('gameOverScreen').style.display='flex';
  document.getElementById('hud').style.display='none';
}

function winGame() {
  state='win';
  document.getElementById('winScore').textContent='ניקוד סופי: '+score;
  document.getElementById('winScreen').style.display='flex';
  document.getElementById('hud').style.display='none';
}

// ---- Controls ----
window.addEventListener('keydown', e=>{ keys[e.key]=true; if(e.key===' ')e.preventDefault(); });
window.addEventListener('keyup',   e=>{ keys[e.key]=false; });

// Mobile touch
let touchStartX=0, touchStartY=0;
canvas.addEventListener('touchstart', e=>{
  touchStartX=e.touches[0].clientX; touchStartY=e.touches[0].clientY;
  keys[' ']=true;
},{passive:true});
canvas.addEventListener('touchmove', e=>{
  const dx=e.touches[0].clientX-touchStartX, dy=e.touches[0].clientY-touchStartY;
  player.x+=dx*0.8; player.y+=dy*0.8;
  touchStartX=e.touches[0].clientX; touchStartY=e.touches[0].clientY;
},{passive:true});
canvas.addEventListener('touchend',()=>{ keys[' ']=false; });
</script>
